<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- Armin Grotesk lokal lisanslı bir font; user public/fonts/ klasörüne ttf/woff koyarsa otomatik yüklenir. -->
    <style>
      @font-face {
        font-family: 'Armin Grotesk';
        src: url('/fonts/ArminGrotesk-Regular.woff2') format('woff2'),
             url('/fonts/ArminGrotesk-Regular.woff') format('woff');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Armin Grotesk';
        src: url('/fonts/ArminGrotesk-Medium.woff2') format('woff2'),
             url('/fonts/ArminGrotesk-Medium.woff') format('woff');
        font-weight: 500;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Armin Grotesk';
        src: url('/fonts/ArminGrotesk-Bold.woff2') format('woff2'),
             url('/fonts/ArminGrotesk-Bold.woff') format('woff');
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Armin Grotesk';
        src: url('/fonts/ArminGrotesk-ExtraBold.woff2') format('woff2'),
             url('/fonts/ArminGrotesk-ExtraBold.woff') format('woff');
        font-weight: 800;
        font-style: normal;
        font-display: swap;
      }
    </style>
    <title>UYUM</title>
  </head>
  <body>
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
      <defs>
        <filter id="cb-deuteranopia-filter">
          <feColorMatrix type="matrix" values="
            0.625 0.375 0    0 0
            0.7   0.3   0    0 0
            0     0.3   0.7  0 0
            0     0     0    1 0"/>
        </filter>
        <filter id="cb-protanopia-filter">
          <feColorMatrix type="matrix" values="
            0.567 0.433 0      0 0
            0.558 0.442 0      0 0
            0     0.242 0.758  0 0
            0     0     0      1 0"/>
        </filter>
        <filter id="cb-tritanopia-filter">
          <feColorMatrix type="matrix" values="
            0.95 0.05  0      0 0
            0    0.433 0.567  0 0
            0    0.475 0.525  0 0
            0    0     0      1 0"/>
        </filter>
      </defs>
    </svg>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
